services:
  - type: web
    name: citizen-health-backend
    env: python
    region: singapore
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: FIREBASE_MODE
        value: mock
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: citizen-health-backend
          type: web
          property: host
